body:
  text: 上清歩虚三契頌元始洞空无三炁𥼃上門紫翮煥太空四明植靈根妙化發東瓊三便啓西崑皓映九玄清五華帶錦雲離羅煥神燈七星曜北元飄飄上法畿翼翼帝一尊落落髙上章羽童何紛紛流香本無色洞入萬仙群左迴三流劫右轉萬天關雲華纓玉雲八鳳舞空輪四時無停機青白早明分九九攺劫運三三度一椿天地有終㑹否激歸在幡洞明正一法嚴終六天文太平反空無奉翼後聖君靈風起西門錦雲生東瓊二氣煥玉洲流香乗烟輕五華披風散倐忽朗九清騫林曜朱日黄華逐月生中有採芝童衣羽帶飛青風景萬嶺峯逍遥宴緑軿總御九空輪運開無稽程左命三天文右攝六天兵檢氣及空洞天度應運傾劫運自有㑹誰測敗與成洪波淪雲綱六合無遺形白尸飄長流孤魂因復零悲此去來際方覺正法明至學加精修東華結瓊名欣有白簡人相與樂太平洞闕運天綱王氣轉三微紫戸吐瓊簡金門納神暉八㑹交真風晃朗重冥開天際九清外落落髙晨廻三色返空无四候應玉畿河俟巳鼓筆五行潜相推六度無終劫運極乗氣歸萬魔羅天布群凶競吐威兆人負災衝積尸令人悲妙哉正法文履劫明不衰至時相奉迎契在九天扉與爾期太平放身無異飛上清旋行讃大道洞玄微髙虚總三輪金仙啓靈扉煥若九天分太華散紫空八真映素雲玄母結上願行簡之八門萬慶交靈㑹揚烟唱下元妙誦感沖虚得結髙仙群旋行禮空洞稽首朝帝君歩虚憂樂慧辭結我自然氣凝化紫鳳城髙臺超九嶺𡺿𡾓成飛瓊煥落重虚上曲折洞八凊紫蓋曜雲宫流暉翳五靈四達無窮野八氣迴圎明扶揺運太空七景轉天經運來若无相時去隨化傾九圓交度内二象互相征帝一固中元四綱不頺靈南採飛皇寳北列廣寒庭玄房交真㑹虚歌自然生五帝命靈幡魔旗徴萬精魔從空中嘯道世樂未央故與曲素辭慶神欣太平相與契何許萬劫爲一齡迴轉九萬劫同遊紫鳳軿空生紫鳳臺瓊闕參太微靈風洞八㑹北牖閶闔開上有嘯歌兒常唱運喪衰朝則乗景遊暮則附景歸二景齊一體常恐失景暉九炁不常居天地有傾危大劫終一椿百六乗運迴洪泉湧九嶺大鳥翔天垂萬蠢飄長流顧山不得依號泣無崖際能不傷人懹賢聖勤誦經故得乗景飛至時相奉迎同㑹九天扉數盡金馬辰萬癘交横馳不見學仙人但能哭屍悲嗟此愚夫質持命痛何哀散憂九玄臺聚樂偕太空携契十天眞嘯命東海童四達八㑹氣玄運閬臺風日朗西華館意合廣寒空婆娑紫鳯下蕭條九嶺峯流眄无窮野仰觀劫仞中清歌宫商和憂樂自相從二趣諧一契理背反還同相與樂未央持始復持終酣飲玉池醴仰飲飛華皇靈𤓰自可宴味若日月光七曜流芳暉斯樂豈可忘大劫有終運運交二象傾龍門斷天河三五反相征赤鎭據東井華蓋伏晨星玄暉昏八荒穢氣翳天精三官相操促五嶽不固靈萬癘交横馳北帝勇魔兵八綱羅天外聖主乃能清是結自然氣崚𡾓九重城髙觀愍萬兆憂樂從是生玄歌散神衿蒙歡反涕零哀此頑夫輩恡財貪色榮欣欣待命至不顧禍自嬰賢智逆方來晨夜勤誦經禮空念玄虚以度不窮齡若能尋道源八節奏玉名將免九曜災令爾見太平瓊鳳鬱晨飊紫臺曜玉林流光拂重玄嵯峨陵九隂紫景散未霞飛烟互相尋七寳振瓊條靈獸騁雲岑萬仙乗空詠神風揚妙音上有髙晨師拱靜嘯與吟八㑹自然容虚降皆蘭金瓊嚼彌劫旦玉漿散沖心明珠唱靈歌法容和清琴玉章至道宗憂樂解人衿釋我无終齡良娛樂何深自然髙仙韻安能同此欽朝戯東華宫夕遊西華堂取樂二華館不與樂相逢但聞玄歌子悲聲傷天童哀響流寒庭撫悼世運窮天馬踴九河鳥母乗飛龍玄津無橋梁二氣隔不通登我崚𡾓臺仰觀九難中穢氣彌三靈萬兆負災衝八域無遺民大小山嶽崩念此不知學聞經若癡聾相與任運生儵歘得命終哀哉何期酷念子傷我胷紫鳳乗空發崚𡾓九玄嵎氣結則影見氣散則神无飄飄有無際天樂適我娛安同八㑹唱齊我髙仙儔携契十天眞宴我九鳳軀上登玉京闕下戯閬風洲羽騎迅瓊輪紫烟空相扶極朝復待旦偕樂無終憂流眄任運遷億椿始一周歡我自然衿散我懷世憂自無玄靈寳誰能同此遊哀哉空洞内與樂復發憂朝發東蒙嶺夕觀西龍丘不見九靈母北真道相遊遼問大象度二氣忽云周九龍運東井天馬發西嵎北帝放天兵五嶽玄相符萬魔巳束帶五行早相謀兵災羅天布萬兆巳被拘上下皆受㑹蕩除無稽留哀此五難中運至無親踈髙登八㑹官結我㝠中儔歷觀至學者福地以相扶棄家㝷我道剋得度爾軀勤心修至經道成當相須逍遥觀鳳臺豈不樂哉遊大樂㑹中元中元聚樂庭上有八㑹氣婆娑紫鳳生金條附玉根七寳結華鈴龍超極嶺峯鳳嘯駭萬程不見離遊賔但聞鳳雲聲宫啇自相和音響自然成玄歌唱妙曲憂樂結成音吾我自相求誰知真人靈錦雲帶夜月紫耀翳飛瓊三晨洞大暉七元煥五星靈幡有威光流烟靄紫清自謂西華妙未若紫鳳城上有解衿人一面歡萬齡偕樂无終劫因覺天地傾靈運自有巳數終自由玄去來順運迴何爲憂自纒散憂八荒外大象不圭真逍遥歡樂庭誰與憂爲親五難是常㑹所傷自有人宫啇雖不和大歸理自均故與憂樂曲以度學道身苦行研靈文妙義自然鮮但佩曲素章剋入无憂津乗空登鳳臺髙觀承唐年此樂將何樂知憂在何間髙上玉晨憂樂之曲空生鳳臺之上靈文明於五方金音逸朗於十天玉京九曲上真皆鑄金爲簡紫筆書文齊聲合唱玄歌憂樂之曲也其辭深𧷤妙趣洞淵自非髙上之儔莫有能究其篇者金名東華玉字鳳闕乃得見此文爾得佩鳳炁玄丘真書命魔靈幡誦憂樂之曲則五帝衛真天魔敬護保舉上仙得奉迎聖君於上清宫遊於鳳臺之堂也凡受此文毎以本命太歳八節之日及毎月五日十五日二十五日沐浴清齋入室先東向誦青帝曲二首畢再禮朝玉真轉南向誦赤帝曲畢再朝禮玉真轉西向誦白帝曲畢再禮朝玉真轉北向誦黒帝曲畢再禮朝玉真向太歳誦黄帝曲畢再禮朝玉真五方都畢還北向九拜朝玉晨君仰咽氣九過止如此皆施五帝幡於室五方出一清髙聖玉晨鳳臺曲素上經洞真徊玄章太上發玄藴煥爛敷真文落落散天寳十方所共尊不始亦求終不明亦不昏仰登玉京臺逍遙憩崑崙超度泉曲都魔王願欲聞七祖受化生解我宿世怨入控飛玄景出駕浮紫雲重暉曜玉晨玄景開圓明迢迢洞眞殿晃晃七寳精一念度八難長與太上并纏旋獻黄景日華虚中生世知雜俗道莫聞智慧經大矣洞眞戒玄感魔王誠萬椿若一息豈擊千億齡太上體本无散形度弱喪務猷宣玄術天尊並讃揚有縁文自表无因經爲藏若能得此道首即生圓光身濟无待津飄颻逸仙堂无无竟无永有有安入妙天翰蔚无上玄宗自有要回轉三寳輪十方普震曜太上觀玉京魔王空中笑天帝叉手唱衆眞乗虚嘯散華正我念八願自然超靈仙乗慶霄駕龍躡玄波洽眞表嘉祥濯足八天阿福應不我期故爾釋天羅道德冠三界地網亦已過感遇雲眞㑹淨慧經蓮華无上覺四輩芒芒大方外幽顯諒有由无幽故无昧速羅運玄輪眞仙幸華薈時遊渺漭間天人无見際靈妙寄宣通天人有津岸泛舟不測淵常恐風波渙其縁有竒力智勢誰能算冉冉任玄樞昭然冥因判挺頴應眞子靈琴空中彈淨思恭十方玄留不我羡太上敷洞文賢賢歸本縁蕭條三寳囿繁華秀我因伯史與入精質淨生金身終劫復始劫愈覺靈顔新希度禮无上寳文降至眞道林蔚天京下光諸地仙從容散靈威洋洋大法宣太上觀十方晻藹融風穆圓光映三辰眞人披天服魔王叉手立司帀酆京側日月翳行曜七寳煥无極一切營此時禍滅地獄息渺孚无景天尊人莫能測三寳繁十方亹亹空中澄宛轉隨化理一感法輪昇漠漠皦昧間四大與時興空有靡不有崔嵬多山𡺿太上无滯念滅念歸大乗凡十方廻玄禮頌先始北方次東北方東方東南方南方西南方西方西北方上方下方一頌一拜廻玄品者出乎自然而然虚峙九千餘劫其丈乃見元始天王學道於太上後道成太上命元始天王盛而撰焉以配大戒當以本命日說三百部戒而頌此文若日中及夜半時修之也先齋而後行道不知本命用甲子日若十年以後可正月一日行道爾金章十二篇宴眄太霞宫金闕曜紫清仙房映太素四軒皆朱瓊擲輪空洞津控轡舞緑軿玊華飛雲蓋西妃運錦旌翻然塵濁外儵歘佳人庭宿感應期來所得巳在冥乗風想九霄共酣丹華嬰顧謝世中物安知无中靈北登玄冥闕携手經髙羅香烟散八景玄風鼓絳波仰超琅琅津俯眄曲嶽阿嘯歌雲上唱鳯鳴洞九霞乗炁浮太空曷爲躡山阿金節命羽靈徴兵摧萬魔漱吸圓晨暉積椿方嬰芽紛紛趣競中不解可奈何北壟鬱霄藹絳樹結紫華青蘂落鳯林碧㮏秀巖阿靈闕凌太空瓊房參太霞雲興曲室内八風飛冥沙九彌彈帝墉龍嘯唱節和扇飊五嶽嶺握節徴萬魔顧盻須㬰頃忽然椿巳過哀哉朝生者安知齡紀多隅景布林宫運軸沖漠幽至觀映六庭大小盡逍遙龍吹纒蓋雲虎今駭萬條三素啓髙圖丹霞蔚晨霄羽旂横靈津紫軿飛華翹控轡九天外俯仰自寥寥塵誅結囂穢神喪炁亦凋奚不㝷遠御八千乃一朝朝濟碧海波飛輪辭緑房髙唱儔友篇蓋越滄浪中三契玊霄賔五期東華童羽飊昇帝晨宴此廣寒宫八音虚中彈紫鳯唱靈風絳霞遏明曜八景飛太空咀嚼瓊泉津浩秀還嬰蒙至樂歸五神年積劫刃崇脫屣將何難勞憂喪天中朝駕晨景暉逸轡發紫清浮輪騁太霞揚蓋廣寒庭髙眞禁帝室宫墉引四靈十絶舞空洞飛烟繞錦屏虎扇神風慶紫雲迴龍駢儵歘盻八方一顧椿巳傾蕭蕭玄競子奚不㝷太生神圃秀隱芝昆池灌盻田仰觀玊清闕嵯峨臨絳津紫霞映曲席五雲曜九玄八風起絶宇幽藹緑軒間三元舍西宫東華有佳人北冥唱七嘯明姬歌南眞撫璈參朱津玊節揚六絃合契安非運俱響廣鳯巓同期命萬魔宅此群黒千超然來何難乃啓不窮年駕炁盻空洞乗景愬九天洞鬱廣暉羽玄蓋生无間八烟飊寥輪軌滯不許年撫璈八空響我馬亦無津握節入東華夕宴玄圃巓束帶𢹂五靈解衿翹良人冥感自適運汎然亦有縁俱載凌厲翮一扇動億千絳景浮玄晨紫軒乗雲征仰超金闕内俯盻西華城東華啓五暉神光煥七靈翳映三汜燭流任自齊冥風鼓空洞宇香烟散玊庭手攜織女儛雙衿落錦青元徊交羽旗華蓋隨雲傾宴寢九度外是非不我營抱空泥丸内天姿愈日嬰豈況洞愆穢中慘无聊生扶桑翠空峯朱雲葩微明浪臺有虚上四觀映髙清飛景控紫輪三素轡丹軿寢偃太帝館崚𡾓阿毋庭濯足碧瀨波提契玊醴甖曲晨乗風扇飄飄時下傾暫適地藹中迴駕汜良眞玄㑹自相要流浪任幽冥始知榮辱辛方悟憂促齡曲室可清靜頥神待日成何爲講當塗百痾從是生天庭生金華内以彰隂邪玉谷參玄郷瓊炁互扶羅天眞立遐日飛蘂吐靈沙清晨案天馬迴駕神玄家仙人來入室又以滅百邪道以齋爲先勤行登金闕故設大法橋普度諸人物宿世恩德報道心超然發六齋禮空洞十直神感徹五老刋仙名雲輿相迎謁身飛昇玄都七祖咸解脫上清諸眞章頌
